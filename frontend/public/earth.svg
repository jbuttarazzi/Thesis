<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Space background radial -->
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>

    <!-- Ocean gradient -->
    <radialGradient id="oceanGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a6fa8"/>
      <stop offset="50%" stop-color="#0d4f82"/>
      <stop offset="100%" stop-color="#062d52"/>
    </radialGradient>

    <!-- Atmosphere glow -->
    <radialGradient id="atmosphereGrad" cx="50%" cy="50%" r="50%">
      <stop offset="82%" stop-color="transparent"/>
      <stop offset="90%" stop-color="#4aa8ff" stop-opacity="0.25"/>
      <stop offset="95%" stop-color="#7ec8ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Sunlit highlight -->
    <radialGradient id="highlightGrad" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Shadow / terminator -->
    <radialGradient id="shadowGrad" cx="70%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#000820" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Cloud layers -->
    <filter id="cloudBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <clipPath id="earthClip">
      <circle cx="250" cy="250" r="180"/>
    </clipPath>

    <!-- Star field pattern -->
    <pattern id="stars" x="0" y="0" width="500" height="500" patternUnits="userSpaceOnUse">
      <rect width="500" height="500" fill="transparent"/>
    </pattern>
  </defs>

  <!-- Space background -->
  <rect width="500" height="500" fill="url(#spaceGrad)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="30" cy="45" r="0.8"/><circle cx="78" cy="12" r="1.1"/>
    <circle cx="120" cy="88" r="0.7"/><circle cx="200" cy="20" r="0.9"/>
    <circle cx="350" cy="15" r="1.2"/><circle cx="420" cy="60" r="0.6"/>
    <circle cx="470" cy="30" r="1"/><circle cx="460" cy="120" r="0.7"/>
    <circle cx="490" cy="200" r="0.9"/><circle cx="480" cy="380" r="1.1"/>
    <circle cx="450" cy="460" r="0.8"/><circle cx="380" cy="490" r="0.6"/>
    <circle cx="300" cy="480" r="1"/><circle cx="150" cy="475" r="0.7"/>
    <circle cx="60" cy="450" r="1.2"/><circle cx="15" cy="380" r="0.8"/>
    <circle cx="10" cy="280" r="0.9"/><circle cx="22" cy="160" r="0.7"/>
    <circle cx="55" cy="200" r="0.5"/><circle cx="400" cy="180" r="0.6"/>
    <circle cx="440" cy="300" r="0.8"/><circle cx="90" cy="380" r="0.5"/>
    <circle cx="170" cy="440" r="0.7"/><circle cx="320" cy="460" r="0.9"/>
  </g>

  <!-- Earth sphere - ocean base -->
  <circle cx="250" cy="250" r="180" fill="url(#oceanGrad)"/>

  <!-- Continents group clipped to earth -->
  <g clip-path="url(#earthClip)" fill="#2d8a4e">

    <!-- North America -->
    <path d="M110,140 C120,130 145,125 160,130 C175,135 185,145 190,155 C195,165 200,175 195,185 C190,195 180,205 170,210 C160,215 145,220 135,215 C125,210 115,195 110,180 C105,165 100,150 110,140 Z" fill="#3a9a58"/>
    <path d="M105,165 C112,155 125,148 138,150 C150,152 160,162 165,175 C170,188 168,202 158,210 C148,218 132,220 120,215 C108,210 100,195 100,180 C100,172 102,168 105,165 Z" fill="#3a9a58"/>
    <!-- Central America finger -->
    <path d="M155,212 C158,208 163,210 165,215 C167,220 162,228 157,225 C152,222 152,216 155,212 Z"/>

    <!-- South America -->
    <path d="M165,245 C172,238 182,235 192,238 C202,241 210,250 213,262 C216,274 215,290 210,302 C205,314 195,322 185,320 C175,318 165,308 160,295 C155,282 157,268 162,255 C163,250 164,247 165,245 Z" fill="#3a9a58"/>

    <!-- Europe -->
    <path d="M252,138 C258,132 268,130 275,134 C282,138 286,147 285,156 C284,165 278,172 270,175 C262,178 252,174 247,166 C242,158 245,145 252,138 Z" fill="#3a9a58"/>

    <!-- Africa -->
    <path d="M262,178 C270,170 282,168 292,172 C302,176 310,186 313,200 C316,214 314,232 308,246 C302,260 292,270 280,272 C268,274 257,264 252,250 C247,236 248,218 252,204 C255,194 258,184 262,178 Z" fill="#3a9a58"/>

    <!-- Asia (large mass) -->
    <path d="M298,125 C310,115 330,110 355,112 C380,114 405,122 420,135 C435,148 442,165 440,182 C438,199 428,215 412,224 C396,233 374,236 352,232 C330,228 310,216 298,200 C286,184 285,165 290,148 C293,138 296,130 298,125 Z" fill="#3a9a58"/>

    <!-- Australia -->
    <path d="M362,300 C370,292 385,290 397,295 C409,300 416,315 414,330 C412,345 402,355 388,356 C374,357 362,346 357,332 C352,318 354,308 362,300 Z" fill="#3a9a58"/>

    <!-- Greenland -->
    <path d="M195,105 C200,98 212,95 220,100 C228,105 230,118 226,128 C222,138 212,143 202,140 C192,137 187,124 190,112 C191,109 193,107 195,105 Z" fill="#4aaa68"/>

    <!-- Antarctica hint -->
    <path d="M100,390 C130,382 170,378 210,380 C250,382 290,382 330,380 C370,378 400,382 420,390 C430,400 430,420 250,430 C70,420 70,400 100,390 Z" fill="#d4eaf7" opacity="0.7"/>
  </g>

  <!-- Cloud layer (clipped) -->
  <g clip-path="url(#earthClip)" opacity="0.75" filter="url(#cloudBlur)">
    <!-- Cloud wisps -->
    <ellipse cx="180" cy="155" rx="35" ry="10" fill="white" opacity="0.7" transform="rotate(-20,180,155)"/>
    <ellipse cx="210" cy="145" rx="28" ry="8" fill="white" opacity="0.6" transform="rotate(-15,210,145)"/>
    <ellipse cx="320" cy="195" rx="40" ry="9" fill="white" opacity="0.65" transform="rotate(10,320,195)"/>
    <ellipse cx="290" cy="260" rx="30" ry="8" fill="white" opacity="0.55" transform="rotate(-5,290,260)"/>
    <ellipse cx="155" cy="305" rx="38" ry="9" fill="white" opacity="0.6" transform="rotate(-25,155,305)"/>
    <ellipse cx="390" cy="140" rx="25" ry="7" fill="white" opacity="0.5" transform="rotate(15,390,140)"/>
    <ellipse cx="240" cy="370" rx="50" ry="11" fill="white" opacity="0.6" transform="rotate(-8,240,370)"/>
    <!-- Hurricane swirl suggestion -->
    <ellipse cx="350" cy="290" rx="22" ry="6" fill="white" opacity="0.5" transform="rotate(30,350,290)"/>
    <ellipse cx="365" cy="298" rx="18" ry="5" fill="white" opacity="0.4" transform="rotate(55,365,298)"/>
  </g>

  <!-- Sunlit highlight overlay -->
  <circle cx="250" cy="250" r="180" fill="url(#highlightGrad)"/>

  <!-- Shadow / terminator -->
  <circle cx="250" cy="250" r="180" fill="url(#shadowGrad)"/>

  <!-- Atmosphere glow ring -->
  <circle cx="250" cy="250" r="180" fill="url(#atmosphereGrad)"/>
  <!-- Outer atmosphere edge -->
  <circle cx="250" cy="250" r="185" fill="none" stroke="#5ab8ff" stroke-width="4" opacity="0.2"/>
  <circle cx="250" cy="250" r="190" fill="none" stroke="#7ecfff" stroke-width="2" opacity="0.1"/>

  <!-- Specular glint on ocean -->
  <ellipse cx="195" cy="210" rx="18" ry="8" fill="white" opacity="0.08" transform="rotate(-30,195,210)"/>
</svg>
